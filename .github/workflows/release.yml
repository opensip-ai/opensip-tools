name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - name: Publish packages
        run: |
          pnpm --filter @opensip-tools/core publish --no-git-checks --access public --provenance
          pnpm --filter @opensip-tools/checks-builtin publish --no-git-checks --access public --provenance
          pnpm --filter @opensip-tools/simulation publish --no-git-checks --access public --provenance
          pnpm --filter @opensip-tools/cli publish --no-git-checks --access public --provenance
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
